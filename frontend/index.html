    {
      "@context": "https://schema.org",

      },

    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is MindTrack AI a replacement for a human therapist?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, MindTrack AI is designed to be a supplemental tool for mental wellness. While it provides advanced real-time emotion detection and AI-driven support, it is not a substitute for professional medical advice, diagnosis, or treatment."
          }
        },
        {
          "@type": "Question",
          "name": "How does the real-time emotion detection work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We use on-device processing to analyze facial micro-expressions and vocal intonations via your camera and microphone during live sessions. This data is processed instantly to guide the AI's empathetic responses."
          }
        },
        {
          "@type": "Question",
          "name": "Is my video and audio data recorded or saved?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely not. We process video and audio streams entirely in real-time. No recordings are ever saved to our servers or databases, ensuring complete privacy."
          }
        },
        {
          "@type": "Question",
          "name": "Can MindTrack AI detect stress and anxiety?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, our multi-modal AI analyzes physiological signals, vocal markers, and text sentiment to identify patterns highly correlated with stress and anxiety."
          }
        }
      ]
    }
    </script>
